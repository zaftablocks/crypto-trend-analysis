<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Trend Analysis</title>
    <link rel="stylesheet" href="styles.css">
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
</head>
<body>
    <header>
        <h1>Crypto Trend Analysis</h1>
    </header>
    <div id="coin-selector">
    <label for="coin">Select Crypto Coin:</label>
    <select id="coin">
        <option value="BINANCE:BTCUSDT">BTC/USDT</option>
        <option value="BINANCE:ETHUSDT">ETH/USDT</option>
        <option value="BINANCE:XRPUSDT">XRP/USDT</option>
        <!-- Tambahkan lebih banyak pilihan sesuai kebutuhan -->
    </select>
</div>
    <div id="chart-container">
        <div id="chart"></div>
    </div>
    <footer>
        <p>&copy; 2024 Crypto Trends</p>
    </footer>
    <script src="app.js"></script>
</body>
</html>
